# permissions for end users to view guacamoleconnections.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: guacamole-operator
    app.kubernetes.io/managed-by: kustomize
  name: guacamoleconnection-viewer-role
rules:
- apiGroups:
  - guacamole.guacamole.io
  resources:
  - guacamoleconnections
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - guacamole.guacamole.io
  resources:
  - guacamoleconnections/status
  verbs:
  - get
