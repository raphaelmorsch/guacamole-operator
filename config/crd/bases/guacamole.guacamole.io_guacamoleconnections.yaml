---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: guacamoleconnections.guacamole.guacamole.io
spec:
  group: guacamole.guacamole.io
  names:
    kind: GuacamoleConnection
    listKind: GuacamoleConnectionList
    plural: guacamoleconnections
    singular: guacamoleconnection
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.guacamoleRef.name
      name: Instance
      type: string
    - jsonPath: .spec.protocol
      name: Protocol
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.connectionID
      name: ConnectionID
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: GuacamoleConnection is the Schema for the guacamoleconnections
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GuacamoleConnectionSpec defines a Guacamole connection stored
              in the instance database.
            properties:
              additionalParameters:
                additionalProperties:
                  type: string
                description: AdditionalParameters adds arbitrary Guacamole connection
                  parameters.
                type: object
              displayName:
                description: |-
                  DisplayName is the connection name shown in the Guacamole UI.
                  Defaults to the resource name when unset.
                type: string
              guacamoleRef:
                description: GuacamoleRef links this connection to a Guacamole stack
                  instance.
                properties:
                  name:
                    description: Name of the Guacamole resource.
                    type: string
                  namespace:
                    description: |-
                      Namespace of the Guacamole resource.
                      Defaults to the GuacamoleConnection namespace when unset.
                    type: string
                required:
                - name
                type: object
              maxConnections:
                description: MaxConnections limits concurrent sessions for this connection.
                format: int32
                type: integer
              maxConnectionsPerUser:
                description: MaxConnectionsPerUser limits concurrent sessions per
                  user.
                format: int32
                type: integer
              parentGroup:
                description: |-
                  ParentGroup places the connection inside a connection group by name.
                  Leave empty to create the connection at the root level.
                type: string
              permissions:
                description: Permissions grants users or groups access to this connection.
                items:
                  description: ConnectionPermissionSpec maps to guacamole_connection_permission
                    rows.
                  properties:
                    entityName:
                      description: EntityName is the Guacamole user or group name.
                      type: string
                    entityType:
                      default: USER
                      description: EntityType is USER or USER_GROUP.
                      enum:
                      - USER
                      - USER_GROUP
                      type: string
                    permission:
                      default: READ
                      description: Permission granted on the connection.
                      enum:
                      - READ
                      - UPDATE
                      - DELETE
                      - ADMINISTER
                      type: string
                  required:
                  - entityName
                  type: object
                type: array
              protocol:
                description: Protocol is the guacd protocol for this connection.
                enum:
                - rdp
                - vnc
                - ssh
                - telnet
                - kubernetes
                type: string
              proxy:
                description: Proxy optionally overrides the guacd proxy for this connection.
                properties:
                  encryption:
                    description: Encryption method used by guacd.
                    enum:
                    - NONE
                    - SSL
                    type: string
                  hostname:
                    description: Hostname of the guacd instance to use.
                    type: string
                  port:
                    description: Port of the guacd instance to use.
                    format: int32
                    type: integer
                type: object
              rdp:
                description: RDP holds protocol parameters when protocol is "rdp".
                properties:
                  clientName:
                    description: ClientName sent to the RDP server.
                    type: string
                  colorDepth:
                    description: ColorDepth of the remote display.
                    format: int32
                    type: integer
                  console:
                    description: Console connects to the administrative console session.
                    type: boolean
                  createDrivePath:
                    description: CreateDrivePath creates the drive path automatically.
                    type: boolean
                  disableAudio:
                    description: DisableAudio disables audio output.
                    type: boolean
                  disableBitmapCaching:
                    description: DisableBitmapCaching disables bitmap caching.
                    type: boolean
                  disableGlyphCaching:
                    description: DisableGlyphCaching disables glyph caching.
                    type: boolean
                  disableOffscreenCaching:
                    description: DisableOffscreenCaching disables offscreen caching.
                    type: boolean
                  domain:
                    description: Domain for RDP authentication.
                    type: string
                  dpi:
                    description: DPI of the remote display.
                    format: int32
                    type: integer
                  driveName:
                    description: DriveName is the name of the redirected drive.
                    type: string
                  drivePath:
                    description: DrivePath is the path exposed through drive redirection.
                    type: string
                  enableAudioInput:
                    description: EnableAudioInput enables microphone redirection.
                    type: boolean
                  enableDrive:
                    description: EnableDrive enables drive redirection.
                    type: boolean
                  enableFontSmoothing:
                    description: EnableFontSmoothing enables font smoothing.
                    type: boolean
                  enablePrinting:
                    description: EnablePrinting enables printer redirection.
                    type: boolean
                  enableSftp:
                    description: EnableSFTP enables the SFTP side channel.
                    type: boolean
                  enableTheming:
                    description: EnableTheming enables window theming on the remote
                      desktop.
                    type: boolean
                  enableWallpaper:
                    description: EnableWallpaper enables the remote wallpaper.
                    type: boolean
                  gatewayDomain:
                    description: GatewayDomain is the domain for the RDP gateway.
                    type: string
                  gatewayHostname:
                    description: GatewayHostname is the hostname of the RDP gateway.
                    type: string
                  gatewayPassword:
                    description: GatewayPassword is the password for the RDP gateway.
                    type: string
                  gatewayPasswordSecretRef:
                    description: GatewayPasswordSecretRef references the gateway password
                      secret.
                    properties:
                      key:
                        default: password
                        description: Key within the secret.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                    required:
                    - name
                    type: object
                  gatewayPort:
                    description: GatewayPort is the port of the RDP gateway.
                    format: int32
                    type: integer
                  gatewayUsername:
                    description: GatewayUsername is the username for the RDP gateway.
                    type: string
                  height:
                    description: Height of the remote display in pixels.
                    format: int32
                    type: integer
                  hostname:
                    description: Hostname or IP address of the remote desktop server.
                    type: string
                  ignoreCert:
                    description: IgnoreCert accepts self-signed or invalid RDP certificates.
                    type: boolean
                  initialProgram:
                    description: InitialProgram starts a specific program instead
                      of the desktop shell.
                    type: string
                  password:
                    description: |-
                      Password for RDP authentication.
                      Prefer passwordSecretRef in production.
                    type: string
                  passwordSecretRef:
                    description: PasswordSecretRef references a secret containing
                      the RDP password.
                    properties:
                      key:
                        default: password
                        description: Key within the secret.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                    required:
                    - name
                    type: object
                  port:
                    default: 3389
                    description: Port of the RDP server.
                    format: int32
                    type: integer
                  printerName:
                    description: PrinterName is the redirected printer name.
                    type: string
                  remoteApp:
                    description: RemoteApp launches a RemoteApp instead of the full
                      desktop.
                    type: string
                  remoteAppArgs:
                    description: RemoteAppArgs are arguments passed to the RemoteApp.
                    type: string
                  remoteAppDir:
                    description: RemoteAppDir is the working directory for the RemoteApp.
                    type: string
                  resizeMethod:
                    description: ResizeMethod controls display resizing behavior.
                    enum:
                    - reconnect
                    - display-update
                    - "off"
                    type: string
                  security:
                    default: nla
                    description: Security mode for the RDP session.
                    enum:
                    - any
                    - nla
                    - nla-ext
                    - tls
                    - vmconnect
                    - rdp
                    type: string
                  serverLayout:
                    description: ServerLayout selects the keyboard layout sent to
                      the server.
                    type: string
                  timeout:
                    description: Timeout in seconds while connecting to the RDP server.
                    format: int32
                    type: integer
                  timezone:
                    description: Timezone for the remote desktop session.
                    type: string
                  username:
                    description: Username for RDP authentication.
                    type: string
                  width:
                    description: Width of the remote display in pixels.
                    format: int32
                    type: integer
                required:
                - hostname
                type: object
              ssh:
                description: SSH holds protocol parameters when protocol is "ssh".
                properties:
                  colorScheme:
                    description: ColorScheme for the terminal emulator.
                    enum:
                    - gray-black
                    - green-black
                    - white-black
                    type: string
                  command:
                    description: Command executed after the SSH session starts.
                    type: string
                  fontName:
                    description: FontName used by the terminal emulator.
                    type: string
                  fontSize:
                    description: FontSize used by the terminal emulator.
                    format: int32
                    type: integer
                  hostname:
                    description: Hostname or IP address of the SSH server.
                    type: string
                  passphrase:
                    description: Passphrase for the private key.
                    type: string
                  passphraseSecretRef:
                    description: PassphraseSecretRef references a secret containing
                      the key passphrase.
                    properties:
                      key:
                        default: password
                        description: Key within the secret.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                    required:
                    - name
                    type: object
                  password:
                    description: Password for SSH authentication.
                    type: string
                  passwordSecretRef:
                    description: PasswordSecretRef references a secret containing
                      the SSH password.
                    properties:
                      key:
                        default: password
                        description: Key within the secret.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                    required:
                    - name
                    type: object
                  port:
                    default: 22
                    description: Port of the SSH server.
                    format: int32
                    type: integer
                  privateKey:
                    description: PrivateKey for key-based authentication.
                    type: string
                  privateKeySecretRef:
                    description: PrivateKeySecretRef references a secret containing
                      the SSH private key.
                    properties:
                      key:
                        default: password
                        description: Key within the secret.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                    required:
                    - name
                    type: object
                  username:
                    description: Username for SSH authentication.
                    type: string
                required:
                - hostname
                type: object
              vnc:
                description: VNC holds protocol parameters when protocol is "vnc".
                properties:
                  colorDepth:
                    description: ColorDepth of the remote display.
                    format: int32
                    type: integer
                  cursor:
                    description: Cursor selects the local cursor rendering mode.
                    enum:
                    - remote
                    - local
                    type: string
                  dpi:
                    description: Dpi of the remote display.
                    format: int32
                    type: integer
                  height:
                    description: Height of the remote display in pixels.
                    format: int32
                    type: integer
                  hostname:
                    description: Hostname or IP address of the VNC server.
                    type: string
                  password:
                    description: Password for VNC authentication.
                    type: string
                  passwordSecretRef:
                    description: PasswordSecretRef references a secret containing
                      the VNC password.
                    properties:
                      key:
                        default: password
                        description: Key within the secret.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                    required:
                    - name
                    type: object
                  port:
                    default: 5900
                    description: Port of the VNC server.
                    format: int32
                    type: integer
                  readOnly:
                    description: ReadOnly opens the session in read-only mode.
                    type: boolean
                  swapRedBlue:
                    description: SwapRedBlue swaps red and blue color channels.
                    type: boolean
                  width:
                    description: Width of the remote display in pixels.
                    format: int32
                    type: integer
                required:
                - hostname
                type: object
            required:
            - guacamoleRef
            - protocol
            type: object
          status:
            description: GuacamoleConnectionStatus defines the observed state of GuacamoleConnection.
            properties:
              conditions:
                description: Conditions represent the latest observations of the connection
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              connectionID:
                description: ConnectionID is the guacamole_connection.connection_id
                  value.
                format: int64
                type: integer
              phase:
                description: Phase is the current lifecycle phase.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
