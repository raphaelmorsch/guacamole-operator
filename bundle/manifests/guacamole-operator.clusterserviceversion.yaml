  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: GuacamoleConnection defines a connection in a Guacamole instance
        database.
      displayName: Guacamole Connection
      kind: GuacamoleConnection
      name: guacamoleconnections.guacamole.guacamole.io
      version: v1alpha1
    - description: Guacamole is the Schema for the guacamoles API.
      displayName: Guacamole
      kind: Guacamole
      name: guacamoles.guacamole.guacamole.io
      version: v1alpha1
  description: |
    ## Guacamole Operator for OpenShift

    This operator automates the deployment of **Apache Guacamole** on Red Hat OpenShift,
    based on the [guacamole-rdp](https://github.com/raphaelmorsch/guacamole-rdp) reference implementation.

    For each `Guacamole` custom resource, the operator provisions:

    - MySQL database with persistent storage
    - guacd proxy daemon (FreeRDP/VNC/SSH backend)
    - Guacamole web application with automatic schema initialization
    - OpenShift Route for browser access

    The deployment is **rootless** and respects OpenShift Security Context Constraints (SCC).

    ### Features

    - Declarative management via Custom Resource
    - Automatic database schema initialization
    - FreeRDP certificate store workaround (emptyDir mount)
    - OpenShift Route exposure with TLS edge termination
    - Configurable images, replicas, storage, and HPA autoscaling for Guacamole and guacd
    - Declarative GuacamoleConnection resources synced to the MySQL database
  displayName: Guacamole Operator
